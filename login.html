<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Blink Client</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-box {
      max-width: 420px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }
    .auth-box h1 { margin-bottom: 8px; }
    .auth-box .sub { color: var(--muted); margin-bottom: 32px; font-size: 0.95rem; }
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
    .form-group input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .toggle { margin-top: 20px; text-align: center; font-size: 0.9rem; color: var(--muted); }
    .toggle a { color: var(--accent); cursor: pointer; }
    .msg { margin-top: 14px; text-align: center; font-size: 0.9rem; min-height: 20px; }
    .msg.error { color: #ff5555; }
    .msg.success { color: #55ff99; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="/">⚡ Blink Client</a>
  </nav>

  <div class="auth-box">
    <h1 id="form-title">Welcome back</h1>
    <p class="sub" id="form-sub">Sign in to access your downloads.</p>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">Sign In</button>
    <div class="msg" id="msg"></div>

    <div class="toggle">
      <span id="toggle-text">Don't have an account?</span>
      <a onclick="toggleMode()"> <span id="toggle-link">Sign Up</span></a>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://fyuqjigcnmknumvaslbc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dXFqaWdjbm1rbnVtdmFzbGJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjcwNjcsImV4cCI6MjA4ODAwMzA2N30.JKVHOYbxFf8G6SJZgY8bDyEfVoZmXvpbTVPXrFD85YY'
    );

    let isSignUp = false;

    // If already logged in, skip to dashboard
    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    function toggleMode() {
      isSignUp = !isSignUp;
      document.getElementById('form-title').textContent  = isSignUp ? 'Create account' : 'Welcome back';
      document.getElementById('form-sub').textContent    = isSignUp ? 'Sign up to access your downloads.' : 'Sign in to access your downloads.';
      document.getElementById('submit-btn').textContent  = isSignUp ? 'Sign Up' : 'Sign In';
      document.getElementById('toggle-text').textContent = isSignUp ? 'Already have an account?' : "Don't have an account?";
      document.getElementById('toggle-link').textContent = isSignUp ? 'Sign In' : 'Sign Up';
      setMsg('', '');
    }

    function setMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleSubmit() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      if (!email || !password) return setMsg('Fill in all fields.', 'error');

      btn.disabled = true;
      btn.textContent = isSignUp ? 'Creating account…' : 'Signing in…';
      setMsg('', '');

      const { error } = isSignUp
        ? await sb.auth.signUp({ email, password })
        : await sb.auth.signInWithPassword({ email, password });

      if (error) {
        setMsg(error.message, 'error');
        btn.disabled = false;
        btn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
      } else if (isSignUp) {
        setMsg('Check your email to confirm your account.', 'success');
        btn.disabled = false;
        btn.textContent = 'Sign Up';
      } else {
        window.location.href = 'dashboard.html';
      }
    }

    // Allow Enter key
    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>
</body>
</html>
