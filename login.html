<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Blink Client</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .auth-box {
      max-width: 420px;
      margin: 0 auto;
      padding: 120px 24px 80px;
    }
    .auth-box h1 { margin-bottom: 8px; }
    .auth-box .sub { color: var(--muted); margin-bottom: 32px; font-size: 0.95rem; }

    .tabs { display: flex; gap: 0; margin-bottom: 28px; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .tab {
      flex: 1; padding: 10px; text-align: center;
      cursor: pointer; font-weight: 600; font-size: 0.9rem;
      color: var(--muted); background: transparent;
      border: none; transition: background .2s, color .2s;
    }
    .tab.active { background: var(--accent); color: #000; }

    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.85rem; color: var(--muted); }
    .form-group input {
      width: 100%;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
      color: var(--text);
      font-size: 1rem;
      outline: none;
      transition: border-color .2s;
    }
    .form-group input:focus { border-color: var(--accent); }
    .btn-submit {
      width: 100%;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 1rem;
      font-weight: 800;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity .2s;
    }
    .btn-submit:hover { opacity: 0.85; }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 14px; text-align: center; font-size: 0.9rem; min-height: 20px; }
    .msg.error { color: #ff5555; }
    .msg.success { color: #55ff99; }
  </style>
</head>
<body>
  <nav>
    <a class="logo" href="/">⚡ Blink Client</a>
  </nav>

  <div class="auth-box">
    <h1>Account</h1>
    <p class="sub">Sign in or create an account to access your downloads.</p>

    <div class="tabs">
      <button class="tab active" id="tab-in"  onclick="setMode('in')">Sign In</button>
      <button class="tab"        id="tab-up"  onclick="setMode('up')">Sign Up</button>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••" />
    </div>

    <button class="btn-submit" id="submit-btn" onclick="handleSubmit()">Sign In</button>
    <div class="msg" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(
      'https://fyuqjigcnmknumvaslbc.supabase.co',
      'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ5dXFqaWdjbm1rbnVtdmFzbGJjIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI0MjcwNjcsImV4cCI6MjA4ODAwMzA2N30.JKVHOYbxFf8G6SJZgY8bDyEfVoZmXvpbTVPXrFD85YY'
    );

    let isSignUp = false;

    sb.auth.getSession().then(({ data }) => {
      if (data.session) window.location.href = 'dashboard.html';
    });

    function setMode(mode) {
      isSignUp = mode === 'up';
      document.getElementById('tab-in').classList.toggle('active', !isSignUp);
      document.getElementById('tab-up').classList.toggle('active', isSignUp);
      document.getElementById('submit-btn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      setMsg('', '');
    }

    function setMsg(text, type) {
      const el = document.getElementById('msg');
      el.textContent = text;
      el.className = 'msg ' + type;
    }

    async function handleSubmit() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn      = document.getElementById('submit-btn');

      if (!email || !password) return setMsg('Fill in all fields.', 'error');
      if (password.length < 6)  return setMsg('Password must be at least 6 characters.', 'error');

      btn.disabled = true;
      btn.textContent = 'Please wait…';
      setMsg('', '');

      if (isSignUp) {
        const { data, error } = await sb.auth.signUp({ email, password });

        if (error) {
          // Too many requests
          if (error.status === 429) {
            setMsg('Too many attempts. Wait a moment and try again.', 'error');
          } else {
            setMsg(error.message, 'error');
          }
        } else if (!data.user || data.user.identities?.length === 0) {
          // Confirmed account already exists
          setMsg('An account with this email already exists. Please sign in.', 'error');
          setMode('in');
        } else if (!data.session) {
          // No session = email confirmation required OR unconfirmed duplicate
          const { error: signInErr } = await sb.auth.signInWithPassword({ email, password });
          if (!signInErr) {
            window.location.href = 'dashboard.html';
          } else if (signInErr.message.toLowerCase().includes('confirm')) {
            setMsg('Check your email for a confirmation link.', 'success');
          } else {
            setMsg('An account with this email already exists. Please sign in.', 'error');
            setMode('in');
          }
        } else {
          window.location.href = 'dashboard.html';
        }

      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });

        if (error) {
          if (error.status === 429) {
            setMsg('Too many attempts. Wait a moment and try again.', 'error');
          } else if (error.message.toLowerCase().includes('invalid')) {
            setMsg('Wrong email or password.', 'error');
          } else if (error.message.toLowerCase().includes('confirm')) {
            setMsg('Please confirm your email first — check your inbox.', 'error');
          } else {
            setMsg(error.message, 'error');
          }
        } else {
          window.location.href = 'dashboard.html';
        }
      }

      btn.disabled = false;
      btn.textContent = isSignUp ? 'Sign Up' : 'Sign In';
    }

    document.addEventListener('keydown', e => { if (e.key === 'Enter') handleSubmit(); });
  </script>
</body>
</html>
